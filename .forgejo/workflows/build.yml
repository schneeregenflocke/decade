# CI auf git.blem.ch (Mirror github-mirror/decade): Build + ctest + clang-tidy-Gate.
# `runner-laptop-omen` bindet den Job EXKLUSIV an den CI-Runner auf laptop-omen —
# der schwere C++-Build (Boost/wx/Submodule) läuft nie auf homelab (RPi4 + USB-SMR),
# wo er die Platte in I/O-Sättigung treibt (loadavg-Vorfall 2026-07-11) und am
# 1200-MB-Limit scheitern würde. Ist der Laptop aus, wartet der Job in der Queue,
# statt auf homelab zu fallen. Getriggert vom Mirror-Sync, den ein GitHub-Webhook
# bei jedem Push sofort anstösst.
name: build
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: runner-laptop-omen
    container:
      image: ubuntu:26.04
    steps:
      # Vor dem Checkout: actions/checkout ist eine JS-Action und braucht
      # node UND git im Job-Container (das nackte Ubuntu-Image hat beides nicht).
      - name: Toolchain & Abhängigkeiten
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            nodejs git cmake ninja-build pkg-config g++ clang-tidy \
            libboost-serialization-dev libepoxy-dev libwxgtk3.2-dev \
            zlib1g-dev libpng-dev libfontconfig-dev libfreetype-dev \
            libicu-dev libglm-dev libmsgsl-dev libgtest-dev libgl1-mesa-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -G Ninja
      - name: Build
        run: ninja -C build
      - name: Tests
        run: ctest --test-dir build --output-on-failure
      - name: clang-tidy-Gate
        run: cmake --build build --target clang-tidy
